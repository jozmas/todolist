<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Môj Google Cloud Plánovač</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus+Jakarta+Sans', sans-serif; background-color: #f8fafc; }
        .todo-item { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .completed { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="min-h-screen py-8 px-4">

    <div class="max-w-xl mx-auto">
        <!-- Užívateľský profil / Login -->
        <div class="flex justify-end mb-6">
            <div id="authContainer" class="flex items-center gap-3 bg-white p-2 rounded-2xl border border-gray-100 shadow-sm">
                <div id="userInfo" class="hidden flex items-center gap-3 pl-2">
                    <img id="userPhoto" src="" alt="" class="w-8 h-8 rounded-full">
                    <span id="userName" class="text-sm font-semibold text-gray-700"></span>
                    <button onclick="logout()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-xl transition">
                        Odhlásiť
                    </button>
                </div>
                <button id="loginBtn" onclick="login()" class="flex items-center gap-2 bg-white text-gray-700 px-4 py-2 rounded-xl text-sm font-bold border border-gray-200 hover:bg-gray-50 transition">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4">
                    Prihlásiť cez Google
                </button>
            </div>
        </div>

        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Cloud Plánovač</h1>
            <p id="userStatus" class="text-gray-500 text-sm">Pripájanie k službe...</p>
        </div>

        <!-- Vstupná časť -->
        <div id="inputSection" class="hidden opacity-0 transition-opacity duration-500">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
                <div class="flex gap-3">
                    <input type="text" id="todoInput" placeholder="Čo treba urobiť?" 
                        class="flex-1 bg-gray-50 border border-gray-200 rounded-2xl py-3 px-5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-gray-800">
                    <button onclick="addTodo()" id="addBtn" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6 px-2">
                <div id="stats" class="text-sm font-semibold text-gray-400 uppercase tracking-wider">0 úloh</div>
                <div class="flex gap-2 text-xs font-bold">
                    <button onclick="clearCompleted()" class="px-3 py-1 rounded-lg text-red-400 hover:bg-red-50">Vymazať hotové</button>
                </div>
            </div>

            <ul id="todoList" class="space-y-3"></ul>

            <div id="emptyState" class="text-center py-20 text-gray-300">
                <i class="fas fa-cloud text-6xl mb-4"></i>
                <p>Váš cloud zoznam je prázdny.</p>
            </div>
        </div>

        <!-- Stav pred prihlásením -->
        <div id="loginPrompt" class="text-center py-20 bg-white rounded-3xl border border-dashed border-gray-200">
            <i class="fas fa-lock text-4xl text-gray-200 mb-4"></i>
            <h3 class="text-xl font-bold text-gray-700 mb-2">Prístup k úlohám zamknutý</h3>
            <p class="text-gray-500 max-w-xs mx-auto mb-6">Pre synchronizáciu medzi zariadeniami sa prihláste. Ak Google nefunguje, použijeme anonymný režim.</p>
            <button onclick="login()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                Aktivovať synchronizáciu
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDocs, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Inicializácia Firebase
        let app, auth, db;
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'todo-cloud-app';

        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "",
                authDomain: "",
                projectId: "",
                storageBucket: "",
                messagingSenderId: "",
                appId: ""
            };

            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase init failed:", e);
            document.getElementById('userStatus').innerText = "Chyba konfigurácie databázy";
        }

        let user = null;
        let unsubscribe = null;

        // Pomocná funkcia na bezpečné prihlásenie
        const performAuth = async (useGoogle = false) => {
            if (!auth) return;
            try {
                if (useGoogle) {
                    await signInWithPopup(auth, provider);
                } else if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.warn("Auth zlyhal:", err.message);
                if (useGoogle || !user) {
                    try { await signInAnonymously(auth); } catch(e) {}
                }
            }
        };

        // Úvodné prihlásenie
        if (auth) performAuth();

        window.login = () => performAuth(true);
        window.logout = () => signOut(auth);

        if (auth) {
            onAuthStateChanged(auth, (u) => {
                const userInfo = document.getElementById('userInfo');
                const loginBtn = document.getElementById('loginBtn');
                const inputSection = document.getElementById('inputSection');
                const loginPrompt = document.getElementById('loginPrompt');
                const userStatus = document.getElementById('userStatus');

                if (u) {
                    user = u;
                    userInfo.classList.remove('hidden');
                    loginBtn.classList.add('hidden');
                    inputSection.classList.remove('hidden');
                    setTimeout(() => inputSection.classList.add('opacity-100'), 50);
                    loginPrompt.classList.add('hidden');
                    
                    const name = u.isAnonymous ? "Hosť" : (u.displayName || 'Používateľ').split(' ')[0];
                    document.getElementById('userName').innerText = name;
                    document.getElementById('userPhoto').src = u.photoURL || 'https://www.gravatar.com/avatar/000?d=mp&f=y';
                    userStatus.innerText = u.isAnonymous ? "Režim hosťa (Cloud aktívny)" : "Vaše úlohy sú synchronizované";
                    
                    initTodoListener();
                } else {
                    user = null;
                    if (unsubscribe) unsubscribe();
                    userInfo.classList.add('hidden');
                    loginBtn.classList.remove('hidden');
                    inputSection.classList.add('hidden');
                    inputSection.classList.remove('opacity-100');
                    loginPrompt.classList.remove('hidden');
                    userStatus.innerText = "Prihláste sa pre synchronizáciu úloh";
                    document.getElementById('todoList').innerHTML = '';
                }
            });
        }

        function initTodoListener() {
            if (!user || !db) return;
            try {
                const q = collection(db, 'artifacts', appId, 'users', user.uid, 'todos');
                unsubscribe = onSnapshot(q, (snapshot) => {
                    const todos = [];
                    snapshot.forEach((doc) => {
                        todos.push({ id: doc.id, ...doc.data() });
                    });
                    todos.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    renderTodos(todos);
                }, (error) => {
                    console.error("Firestore Error:", error);
                });
            } catch (e) {
                console.error("Listener failed:", e);
            }
        }

        window.addTodo = async () => {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (text && user && db) {
                const oldVal = input.value;
                input.value = '';
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'todos'), {
                        text,
                        completed: false,
                        createdAt: serverTimestamp()
                    });
                } catch (e) {
                    console.error("Chyba pri ukladaní:", e);
                    input.value = oldVal;
                }
            }
        };

        window.toggleTodo = async (id, currentStatus) => {
            if (!user || !db) return;
            try {
                const todoRef = doc(db, 'artifacts', appId, 'users', user.uid, 'todos', id);
                await updateDoc(todoRef, { completed: !currentStatus });
            } catch (e) { console.error(e); }
        };

        window.deleteTodo = async (id) => {
            if (!user || !db) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'todos', id));
            } catch (e) { console.error(e); }
        };

        window.clearCompleted = async () => {
            if (!user || !db) return;
            try {
                const q = collection(db, 'artifacts', appId, 'users', user.uid, 'todos');
                const snapshot = await getDocs(q);
                const batch = writeBatch(db);
                snapshot.forEach(doc => {
                    if (doc.data().completed) batch.delete(doc.ref);
                });
                await batch.commit();
            } catch (e) { console.error(e); }
        };

        function renderTodos(todos) {
            const list = document.getElementById('todoList');
            const emptyState = document.getElementById('emptyState');
            const stats = document.getElementById('stats');
            if (!list) return;
            
            list.innerHTML = '';
            if (todos.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            todos.forEach((todo) => {
                const li = document.createElement('li');
                li.className = 'todo-item bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between group';
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <button onclick="toggleTodo('${todo.id}', ${todo.completed})" class="w-6 h-6 rounded-full border-2 ${todo.completed ? 'bg-green-500 border-green-500' : 'border-gray-200'} flex items-center justify-center transition">
                            ${todo.completed ? '<i class="fas fa-check text-white text-xs"></i>' : ''}
                        </button>
                        <span class="text-gray-700 ${todo.completed ? 'completed' : ''}">${todo.text}</span>
                    </div>
                    <button onclick="deleteTodo('${todo.id}')" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition px-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                list.appendChild(li);
            });
            const remaining = todos.filter(t => !t.completed).length;
            stats.innerText = `${remaining} úloh zostáva`;
        }

        document.getElementById('todoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.addTodo();
        });
    </script>
</body>
</html>
