<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Môj Google Cloud Plánovač</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus+Jakarta+Sans', sans-serif; background-color: #f8fafc; }
        .todo-item { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .completed { text-decoration: line-through; opacity: 0.5; }
        .status-badge { transition: all 0.3s ease; }
        button:active { transform: scale(0.96); }
        .loading-spinner { border: 2px solid #f3f3f3; border-top: 2px solid #3498db; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen py-8 px-4">

    <div class="max-w-xl mx-auto">
        <!-- Užívateľský profil / Login -->
        <div class="flex justify-end mb-6">
            <div id="authContainer" class="flex items-center gap-3 bg-white p-2 rounded-2xl border border-gray-100 shadow-sm min-h-[48px]">
                <div id="userInfo" class="hidden flex items-center gap-3 pl-2">
                    <img id="userPhoto" src="" alt="" class="w-8 h-8 rounded-full">
                    <span id="userName" class="text-sm font-semibold text-gray-700"></span>
                    <button id="logoutBtn" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-xl transition">
                        Odhlásiť
                    </button>
                </div>
                <button id="loginBtn" class="flex items-center gap-2 bg-white text-gray-700 px-4 py-2 rounded-xl text-sm font-bold border border-gray-200 hover:bg-gray-50 transition">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="G">
                    Prihlásiť
                </button>
            </div>
        </div>

        <div class="text-center mb-10">
            <div id="modeIndicator" class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 bg-gray-100 text-gray-400 status-badge">
                Inicializácia...
            </div>
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Plánovač Úloh</h1>
            <p id="userStatus" class="text-gray-500 text-sm italic">Pripájanie k systému...</p>
        </div>

        <!-- Vstupná časť -->
        <div id="appUI" class="opacity-0 transition-opacity duration-500">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
                <div class="flex gap-3">
                    <input type="text" id="todoInput" placeholder="Čo máte v pláne?" 
                        class="flex-1 bg-gray-50 border border-gray-200 rounded-2xl py-3 px-5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-gray-800">
                    <button id="addBtn" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6 px-2">
                <div id="stats" class="text-sm font-semibold text-gray-400 uppercase tracking-wider">0 úloh</div>
                <button id="clearCompletedBtn" class="text-xs font-bold px-3 py-1 rounded-lg text-red-400 hover:bg-red-50 transition">Vymazať hotové</button>
            </div>

            <ul id="todoList" class="space-y-3"></ul>

            <div id="emptyState" class="hidden text-center py-20 text-gray-300">
                <i class="fas fa-cloud text-6xl mb-4"></i>
                <p>Zoznam je prázdny</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDocs, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-todo-app';
        let localTodos = []; // Fallback pre lokálny režim

        const elements = {
            input: document.getElementById('todoInput'),
            list: document.getElementById('todoList'),
            stats: document.getElementById('stats'),
            indicator: document.getElementById('modeIndicator'),
            status: document.getElementById('userStatus'),
            appUI: document.getElementById('appUI'),
            userInfo: document.getElementById('userInfo'),
            loginBtn: document.getElementById('loginBtn'),
            userName: document.getElementById('userName'),
            userPhoto: document.getElementById('userPhoto'),
            emptyState: document.getElementById('emptyState'),
            addBtn: document.getElementById('addBtn'),
            clearBtn: document.getElementById('clearCompletedBtn'),
            logoutBtn: document.getElementById('logoutBtn')
        };

        function updateStatus(isOnline, text) {
            elements.indicator.innerText = isOnline ? "Online" : "Lokálne";
            elements.indicator.className = `inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 status-badge ${isOnline ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'}`;
            elements.status.innerText = text;
        }

        // --- HLAVNÁ INICIALIZÁCIA ---
        async function startApp() {
            elements.appUI.classList.remove('opacity-0');
            elements.appUI.classList.add('opacity-100');

            try {
                const config = JSON.parse(__firebase_config);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        elements.userInfo.classList.remove('hidden');
                        elements.loginBtn.classList.add('hidden');
                        elements.userName.innerText = user.isAnonymous ? "Hosť (Cloud)" : user.displayName;
                        elements.userPhoto.src = user.photoURL || 'https://www.gravatar.com/avatar/000?d=mp&f=y';
                        updateStatus(true, user.isAnonymous ? "Anonymný cloud aktívny" : "Cloud synchronizácia beží");
                        listenForData(user.uid);
                    } else {
                        elements.userInfo.classList.add('hidden');
                        elements.loginBtn.classList.remove('hidden');
                        // Ak nie je nikto prihlásený, skúsime anonymne
                        signInAnonymously(auth).catch(fallbackToLocal);
                    }
                });
            } catch (err) {
                console.error("Firebase fail:", err);
                fallbackToLocal();
            }
        }

        function fallbackToLocal() {
            updateStatus(false, "Režim bez cloudu (lokálny)");
            render(localTodos);
        }

        function listenForData(uid) {
            const q = collection(db, 'artifacts', appId, 'users', uid, 'todos');
            onSnapshot(q, (snap) => {
                const todos = [];
                snap.forEach(d => todos.push({ id: d.id, ...d.data() }));
                todos.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                render(todos);
            }, (err) => {
                console.error("Snapshot error:", err);
                fallbackToLocal();
            });
        }

        function render(todos) {
            elements.list.innerHTML = '';
            if (todos.length === 0) elements.emptyState.classList.remove('hidden');
            else elements.emptyState.classList.add('hidden');

            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = 'todo-item bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between group';
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <button class="check-btn w-6 h-6 rounded-full border-2 ${todo.completed ? 'bg-green-500 border-green-500' : 'border-gray-200'} flex items-center justify-center transition">
                            ${todo.completed ? '<i class="fas fa-check text-white text-xs"></i>' : ''}
                        </button>
                        <span class="text-gray-700 transition-all ${todo.completed ? 'completed' : ''}">${todo.text}</span>
                    </div>
                    <button class="del-btn text-gray-300 hover:text-red-500 transition px-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;

                li.querySelector('.check-btn').onclick = () => {
                    if (db && auth.currentUser) {
                        updateDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'todos', todo.id), {
                            completed: !todo.completed
                        });
                    } else {
                        todo.completed = !todo.completed;
                        render(localTodos);
                    }
                };

                li.querySelector('.del-btn').onclick = () => {
                    if (db && auth.currentUser) {
                        deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'todos', todo.id));
                    } else {
                        localTodos = localTodos.filter(t => t !== todo);
                        render(localTodos);
                    }
                };

                elements.list.appendChild(li);
            });
            elements.stats.innerText = `${todos.filter(t => !t.completed).length} úloh zostáva`;
        }

        // --- UDALOSTI ---
        elements.addBtn.onclick = async () => {
            const val = elements.input.value.trim();
            if (!val) return;
            elements.input.value = '';

            if (db && auth.currentUser) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'todos'), {
                        text: val,
                        completed: false,
                        createdAt: serverTimestamp()
                    });
                } catch (e) {
                    console.error("Add error:", e);
                }
            } else {
                localTodos.unshift({ text: val, completed: false, id: Date.now() });
                render(localTodos);
            }
        };

        elements.input.onkeydown = (e) => { if(e.key === 'Enter') elements.addBtn.click(); };

        elements.loginBtn.onclick = async () => {
            if (!auth) return;
            const provider = new GoogleAuthProvider();
            try {
                // Pokus o prihlásenie cez popup
                await signInWithPopup(auth, provider);
            } catch (err) {
                console.warn("Popup blocked or failed, continuing as guest.");
                // Ak zlyhá popup (bežné v iFrame), zostávame v anonymnom režime, ktorý sa spustil v startApp
            }
        };

        elements.logoutBtn.onclick = () => {
            if (auth) signOut(auth);
        };

        elements.clearBtn.onclick = async () => {
            if (db && auth.currentUser) {
                const q = collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'todos');
                const snap = await getDocs(q);
                const batch = writeBatch(db);
                snap.forEach(d => { if (d.data().completed) batch.delete(d.ref); });
                await batch.commit();
            } else {
                localTodos = localTodos.filter(t => !t.completed);
                render(localTodos);
            }
        };

        // Spustenie
        startApp();
    </script>
</body>
</html>
